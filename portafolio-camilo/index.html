<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Portafolio interactivo estilo videojuego de Camilo Andrés Oliveros Chacón — Fullstack Developer, Data Analyst, Ing. Electrónica y Telecomunicaciones.">
<title>Camilo Oliveros · Portafolio Jurásico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ============ PANTALLA PRESS START ============ -->
<div class="start-screen" id="startScreen">
  <div class="start-inner">
    <p class="start-sub">UN PORTAFOLIO JURÁSICO</p>
    <h1 class="start-title">CAMILO<br>OLIVEROS</h1>
    <p class="start-role">Fullstack Developer · Data Analyst · Ing. Electrónica y Telecomunicaciones</p>
    <canvas id="startSprite" class="start-sprite" width="96" height="120" aria-hidden="true"></canvas>
    <button class="press-start" id="pressStart">▶ PRESS START</button>
    <div class="controls-hint">
      <span class="hint-desktop">⌨ <b>←/→</b> para correr · <b>ESPACIO</b> para saltar</span>
      <span class="hint-mobile">📱 Desliza para avanzar · toca para saltar</span>
    </div>
  </div>
</div>

<!-- ============ HUD ============ -->
<div class="hud" id="hud" hidden>
  <div class="hud-left">
    <span class="hud-coin" aria-hidden="true"></span>
    <span id="coinCount">0</span><span class="hud-total">/ <span id="coinTotal">0</span></span>
  </div>
  <div class="hud-center" id="zoneLabel">INICIO</div>
  <div class="hud-right">
    <button class="hud-btn" id="muteBtn" aria-label="Silenciar sonido">🔊</button>
  </div>
  <div class="hud-progress"><div class="hud-progress-fill" id="progressFill"></div></div>
</div>

<!-- ============ ESCENARIO ============ -->
<div class="stage" id="stage" aria-label="Mundo del portafolio">
  <div class="sky"></div>
  <div class="sun" aria-hidden="true"></div>
  <div class="layer" id="layerClouds" aria-hidden="true"></div>
  <div class="layer" id="layerFar" aria-hidden="true"></div>
  <div class="layer" id="layerMid" aria-hidden="true"></div>
  <div class="layer" id="layerWorld"></div>
  <div class="ground" id="ground" aria-hidden="true"></div>
  <canvas id="charCanvas" class="char" width="112" height="144" aria-label="Explorador pixel"></canvas>
</div>

<!-- Altura de scroll -->
<div class="scroll-space" id="scrollSpace" aria-hidden="true"></div>

<script src="script.js"></script>
</body>
</html>
